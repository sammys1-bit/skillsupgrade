<html>
<body style="background:#ffb6c1; text-align:center; font-family:Arial; color:white;">

<h1>🎁 Little Game for You 🎁</h1>

<p id="question">(>_<) Ready?</p>

<input id="answer" placeholder="Type answer here" 
style="padding:8px; border-radius:10px;">

<br><br>

<button onclick="check()">Submit 💌</button>

<p id="msg"></p>

<p style="font-size:20px;">💖 💕 ✨ 🧸 💞</p>

<script>
var step = 0;

var questions = [
  "2 + 2 = ?",
  "What color is the sky? (blue)",
  "Type YES 💖"
];

var answers = [
  "4",
  "blue",
  "yes"
];

var gifts = [
  "🎁 Gift 1: You smiled 😊",
  "🎁 Gift 2: You’re still here 🥺",
  "🎁 Final Gift: You gave me another chance 💖😭"
];

function check() {
  var input = document.getElementById("answer").value.toLowerCase();

  if (input == answers[step]) {
    document.getElementById("msg").innerHTML = gifts[step];
    step++;

    if (step < questions.length) {
      document.getElementById("question").innerHTML = questions[step];
      document.getElementById("answer").value = "";
    } else {
      document.getElementById("question").innerHTML = "💖 Thank you for playing 💖";
      document.getElementById("answer").style.display = "none";
    }

  } else {
    document.getElementById("msg").innerHTML = "🥺 try again please...";
  }
}
</script>

</body>
</html>
